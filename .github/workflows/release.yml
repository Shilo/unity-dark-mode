name: Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for changelog and tag detection

      - name: Calculate next version
        id: version
        shell: bash
        run: |
          # Get the latest version tag (e.g. v1.3), sorted by version
          LATEST=$(git tag --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+$' | head -n 1)

          if [ -z "$LATEST" ]; then
            # No previous release -- start at v0.1
            NEXT="v0.1"
            echo "prev_tag=" >> "$GITHUB_OUTPUT"
          else
            echo "prev_tag=${LATEST}" >> "$GITHUB_OUTPUT"

            # Parse major.minor from tag
            VERSION="${LATEST#v}"
            MAJOR="${VERSION%%.*}"
            MINOR="${VERSION#*.}"

            # Increment: minor + 1, roll over at 10
            MINOR=$((MINOR + 1))
            if [ "$MINOR" -gt 9 ]; then
              MAJOR=$((MAJOR + 1))
              MINOR=0
            fi

            NEXT="v${MAJOR}.${MINOR}"
          fi

          echo "Next version: ${NEXT}"
          echo "tag=${NEXT}" >> "$GITHUB_OUTPUT"

      - name: Setup MSVC x86 toolchain
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x86

      - name: Install CMake
        uses: lukka/get-cmake@latest

      - name: Build x86 Release DLL
        run: |
          cmake -B build -G "NMake Makefiles" -DCMAKE_BUILD_TYPE=Release
          cmake --build build

      - name: Verify output
        run: |
          if (!(Test-Path "build\version.dll")) { throw "version.dll not found" }
          $size = (Get-Item "build\version.dll").Length
          Write-Host "version.dll size: $size bytes"

      - name: Create tag and release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          PREV_TAG="${{ steps.version.outputs.prev_tag }}"

          # Create and push the version tag
          git tag "$TAG"
          git push origin "$TAG"

          # Generate changelog
          if [ -z "$PREV_TAG" ]; then
            CHANGELOG_HEADER="Initial release."
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" --no-merges)
          else
            CHANGELOG_HEADER="Changes since \`${PREV_TAG}\`:"
            CHANGELOG=$(git log "${PREV_TAG}..${TAG}" --pretty=format:"- %s (%h)" --no-merges)
          fi

          # Build release notes
          cat > release-notes.md << NOTES
          ## Installation

          1. Download \`version.dll\` below.
          2. Copy it into the same folder as your \`Unity.exe\` (e.g. \`C:\\Program Files\\Unity\\Editor\\\`).
          3. Launch Unity. The title bar, menu bar, context menus, and dialogs are now dark.

          To uninstall, delete \`version.dll\` from the Unity folder.

          > **Requirements:** Windows 11 (or Windows 10 2004+), Unity 4.6 (32-bit Editor).

          ## Changelog

          ${CHANGELOG_HEADER}

          ${CHANGELOG}
          NOTES

          # Strip leading whitespace from heredoc indentation
          sed -i 's/^          //' release-notes.md

          # Create the GitHub release with the DLL attached
          gh release create "$TAG" build/version.dll \
            --title "$TAG" \
            --notes-file release-notes.md
