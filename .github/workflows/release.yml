name: Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for changelog and tag detection

      - name: Calculate next version
        id: version
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Get the latest version tag (e.g. v1.3), sorted by version
          LATEST=$(git tag --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+$' | head -n 1 || true)

          if [ -z "$LATEST" ]; then
            NEXT="v0.1"
            echo "prev_tag=" >> "$GITHUB_OUTPUT"
          else
            # Check if the latest tag has an incomplete release (orphaned tag).
            # If so, clean it up and reuse that version number.
            # Important: distinguish "release not found" from transient API errors
            # (rate limits, network issues) to avoid deleting a valid tag.
            VIEW_STDERR=$(gh release view "$LATEST" 2>&1 >/dev/null) && VIEW_OK=true || VIEW_OK=false
            if [ "$VIEW_OK" = "false" ]; then
              if echo "$VIEW_STDERR" | grep -qi "not found"; then
                echo "Found orphaned tag ${LATEST} with no release. Cleaning up."
                git push origin --delete "$LATEST" 2>/dev/null || true
                # Recalculate: find the tag before the orphan
                PREV=$(git tag --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+$' | grep -v "^${LATEST}$" | head -n 1 || true)
                echo "prev_tag=${PREV}" >> "$GITHUB_OUTPUT"
                NEXT="$LATEST"
              else
                echo "::error::Failed to check release status for ${LATEST}: ${VIEW_STDERR}"
                exit 1
              fi
            else
              echo "prev_tag=${LATEST}" >> "$GITHUB_OUTPUT"

              # Parse major.minor from tag
              VERSION="${LATEST#v}"
              MAJOR="${VERSION%%.*}"
              MINOR="${VERSION#*.}"

              # Increment: minor + 1, roll over at 10
              MINOR=$((MINOR + 1))
              if [ "$MINOR" -gt 9 ]; then
                MAJOR=$((MAJOR + 1))
                MINOR=0
              fi

              NEXT="v${MAJOR}.${MINOR}"
            fi
          fi

          echo "Next version: ${NEXT}"
          echo "tag=${NEXT}" >> "$GITHUB_OUTPUT"

      - name: Setup MSVC x64 toolchain
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install CMake
        uses: lukka/get-cmake@latest

      - name: Build x64 Release DLL
        run: |
          cmake -B build -G "NMake Makefiles" -DCMAKE_BUILD_TYPE=Release
          cmake --build build

      - name: Verify output and package
        run: |
          if (!(Test-Path "build\version.dll")) { throw "version.dll not found" }
          $size = (Get-Item "build\version.dll").Length
          Write-Host "version.dll size: $size bytes"
          # Zip the DLL so browsers don't block the download
          Compress-Archive -Path "build\version.dll" -DestinationPath "build\version.dll.zip" -Force

      - name: Create tag and release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          PREV_TAG="${{ steps.version.outputs.prev_tag }}"

          # Generate changelog
          if [ -z "$PREV_TAG" ]; then
            CHANGELOG_HEADER="Initial release."
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" --no-merges)
          else
            CHANGELOG_HEADER="Changes since \`${PREV_TAG}\`:"
            CHANGELOG=$(git log "${PREV_TAG}..HEAD" --pretty=format:"- %s (%h)" --no-merges)
          fi

          # Build release notes
          cat > release-notes.md << NOTES
          ## Installation

          1. Download \`version.dll.zip\` below and extract \`version.dll\`.
          2. Open the folder that contains \`Unity.exe\`.
             Easy way: **Unity Hub > Installs > Manage > Show in Explorer**
             Direct path: \`%ProgramFiles%\\Unity\\Hub\\Editor\\<version>\\Editor\\` (example: \`C:\\Program Files\\Unity\\Hub\\Editor\\6000.4.0f1\\Editor\\`)
          3. Move \`version.dll\` into that folder so it sits next to \`Unity.exe\`.
          4. Launch Unity. The title bar, menu bar, context menus, and dialogs are now dark.

          Put the DLL next to \`Unity.exe\`, not in your project folder and not next to the Unity Hub app.

          To uninstall, delete \`version.dll\` from the same folder.

          > **Requirements:** Windows 11 (or Windows 10 2004+), Unity 6.4+ (64-bit Editor).

          ## Changelog

          ${CHANGELOG_HEADER}

          ${CHANGELOG}
          NOTES

          # Strip leading whitespace from heredoc indentation
          sed -i 's/^          //' release-notes.md

          # Create the tag and release via gh. --target creates the tag
          # on the current commit. If the command fails partway through
          # (e.g. asset upload fails after release/tag creation), clean up
          # the partial release and tag so a rerun starts fresh.
          if ! gh release create "$TAG" build/version.dll.zip \
            --title "$TAG" \
            --target "$GITHUB_SHA" \
            --notes-file release-notes.md; then

            echo "Release creation failed. Cleaning up partial release/tag."
            # --cleanup-tag deletes the associated git tag alongside the release.
            gh release delete "$TAG" --cleanup-tag --yes 2>/dev/null || true
            # If the release still couldn't be deleted (it may never have been
            # created), try removing just the tag.
            git push origin --delete "$TAG" 2>/dev/null || true

            # Verify cleanup actually succeeded. Surface warnings so operators
            # know to intervene manually before rerunning.
            if gh release view "$TAG" &>/dev/null; then
              echo "::warning::Cleanup incomplete — release ${TAG} still exists. Delete manually before rerunning."
            fi
            if git ls-remote --tags origin "refs/tags/${TAG}" | grep -q .; then
              echo "::warning::Cleanup incomplete — tag ${TAG} still exists on remote. Delete manually before rerunning."
            fi
            exit 1
          fi
